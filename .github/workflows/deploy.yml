name: Deploy to GitHub Pages

on:
  # Se ejecuta en cada push a la rama principal.
  push:
    branches: [main]
  # Permite lanzarlo manualmente desde la pestaña Actions.
  workflow_dispatch:

# Permisos necesarios para desplegar a GitHub Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Un solo deploy a la vez, sin cancelar los en curso (importante para Pages).
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build with Astro
        run: pnpm build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4