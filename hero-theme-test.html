<!doctype html>
<html lang="es" class="dark">
<head>
<meta charset="UTF-8" />
<style>
  /* Reglas del hero copiadas de global.css (bloque #hero). */
  #hero {
    --hero-fg: #ffffff;
    --hero-fg-soft: rgba(255, 255, 255, 0.9);
    --hero-fg-muted: rgba(255, 255, 255, 0.55);
    --hero-name-gradient: linear-gradient(135deg, #ffffff 0%, #e5e7eb 48%, #9ca3af 100%);
    --hero-text-shadow: 0 2px 20px rgba(0, 0, 0, 0.5);
  }
  :where(html:not(.dark)) #hero {
    --hero-fg: #0b0b14;
    --hero-fg-soft: rgba(11, 11, 20, 0.85);
    --hero-fg-muted: rgba(11, 11, 20, 0.6);
    --hero-name-gradient: linear-gradient(135deg, #0b0b14 0%, #33333f 48%, #5a5a68 100%);
    --hero-text-shadow: 0 2px 18px rgba(255, 255, 255, 0.35);
    --color-fg: #0b0b14;
  }
  .hero-name {
    background-image: var(--hero-name-gradient);
    background-clip: text;
    -webkit-background-clip: text;
    color: transparent;
    -webkit-text-fill-color: transparent;
    filter: drop-shadow(var(--hero-text-shadow));
  }
  .hero-scrim {
    background: radial-gradient(70% 60% at 50% 50%, rgba(0,0,0,0.6) 0%, rgba(0,0,0,0.25) 60%, transparent 100%);
  }
  :where(html:not(.dark)) .hero-scrim {
    background: radial-gradient(70% 60% at 50% 50%, rgba(255,255,255,0.55) 0%, rgba(255,255,255,0.12) 60%, transparent 100%);
  }
  .hero-shader-fallback {
    background:
      radial-gradient(120% 120% at 25% 15%, rgba(0,191,255,0.18), transparent 55%),
      radial-gradient(120% 120% at 80% 90%, rgba(115,0,255,0.22), transparent 55%),
      radial-gradient(120% 120% at 90% 10%, rgba(235,168,255,0.12), transparent 50%),
      #000;
  }
  :where(html:not(.dark)) .hero-shader-fallback {
    background:
      radial-gradient(120% 120% at 25% 15%, rgba(0,191,255,0.22), transparent 55%),
      radial-gradient(120% 120% at 80% 90%, rgba(115,0,255,0.28), transparent 55%),
      radial-gradient(120% 120% at 90% 10%, rgba(235,168,255,0.18), transparent 50%),
      #fff;
  }
  body { margin: 0; font-family: sans-serif; }
  .t-white { color: var(--hero-fg); }
  .t-soft { color: var(--hero-fg-soft); }
  .t-muted { color: var(--hero-fg-muted); }
  .badge { display:inline-block; border:1px solid #888; padding:6px 14px; border-radius:999px; }
</style>
</head>
<body>
<div id="hero" style="position:relative;height:300px;overflow:hidden;">
  <div class="hero-shader-fallback" style="position:absolute;inset:0;"></div>
  <div class="hero-scrim" style="position:absolute;inset:0;"></div>
  <div style="position:relative;z-index:10;text-align:center;padding-top:60px;">
    <div class="badge t-white">Actualmente aprendiendo</div>
    <h1 class="hero-name" style="font-size:56px;margin:10px 0;">Angel Francisco</h1>
    <div class="t-muted" style="letter-spacing:4px;text-transform:uppercase;">Palestina Blancas</div>
    <p class="t-soft" style="font-size:22px;">Estudiante de Ingeniería en Sistemas</p>
  </div>
</div>
<script>
  // Lee ?theme=light|dark para alternar la clase del <html>.
  var t = location.search.match(/theme=(light|dark)/);
  if (t && t[1] === 'light') document.documentElement.classList.remove('dark');
  else document.documentElement.classList.add('dark');
  document.title = 'theme=' + (document.documentElement.classList.contains('dark') ? 'dark' : 'light');
</script>
</body>
</html>
